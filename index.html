<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cruise Finder</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 20px;
  }

  .container {
    max-width: 700px;
    margin: auto;
  }

  h1 {
    text-align: center;
    margin-bottom: 30px;
  }

  .question {
    margin-bottom: 25px;
  }

  label {
    font-weight: bold;
  }

  select {
    width: 100%;
    max-width: 400px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-top: 5px;
  }

  .button {
    background: #0077cc;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
  }

  .button:hover {
    background: #005fa3;
  }

  #results {
    margin-top: 30px;
  }

  .ship {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }

  .high { border-left: 6px solid #4caf50; }
  .medium { border-left: 6px solid #ff9800; }
  .low { border-left: 6px solid #f44336; }

  .top {
    font-size: 12px;
    color: #4caf50;
    font-weight: bold;
  }
</style>
</head>

<body>

<div class="container">

<h1>🚢 Cruise Finder</h1>

<div class="question">
  <label>Budget</label><br>
  <select id="budget">
    <option value="Budget">Budget</option>
    <option value="Mid">Mid</option>
    <option value="Luxury">Luxury</option>
  </select>
</div>

<div class="question">
  <label>Holiday vibe (Ctrl/Cmd for multiple)</label><br>
  <select id="vibes" multiple size="4">
    <option value="Family">Family</option>
    <option value="Adventure">Adventure</option>
    <option value="Relaxation">Relaxation</option>
    <option value="Party">Party</option>
  </select>
</div>

<div class="question">
  <label>Ship size</label><br>
  <select id="size">
    <option value="Small">Small</option>
    <option value="Medium">Medium</option>
    <option value="Large">Large</option>
    <option value="Mega">Mega</option>
  </select>
</div>

<div class="question">
  <label>Amenities (Ctrl/Cmd)</label><br>
  <select id="amenities" multiple size="6">
    <option value="Pools">Pools</option>
    <option value="Spa">Spa</option>
    <option value="Shows">Shows</option>
    <option value="Bars">Bars</option>
    <option value="Adventure Park">Adventure Park</option>
    <option value="Kids Club">Kids Club</option>
  </select>
</div>

<button class="button" onclick="calculateScores()">Find My Perfect Ship</button>

<div id="results"></div>

</div>

<script src="ship_matcher.js"></script>

</body>
</html>
