<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cruise Finder</title>

<!-- Tailwind CSS for modern UI -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Montserrat', sans-serif;
    background-color: #f0f4f8;
  }
</style>
</head>

<body class="min-h-screen flex flex-col items-center p-4">

<!-- Header -->
<header class="text-center mb-8">
  <h1 class="text-4xl font-bold text-blue-700"> Cruise Finder</h1>
  <p class="text-gray-600 mt-2">Find your perfect cruise!</p>
</header>

<!-- Form Section -->
<section class="mb-8 w-full max-w-3xl bg-white p-6 rounded-2xl shadow-lg">
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
    <div>
      <label class="font-bold">Budget</label>
      <select id="budget" class="w-full mt-2 p-2 border rounded-lg shadow-sm">
        <option value="Budget">Budget</option>
        <option value="Mid">Mid</option>
        <option value="Luxury">Luxury</option>
      </select>
    </div>
    <div>
      <label class="font-bold">Ship size</label>
      <select id="size" class="w-full mt-2 p-2 border rounded-lg shadow-sm">
        <option value="Small">Small</option>
        <option value="Medium">Medium</option>
        <option value="Large">Large</option>
        <option value="Mega">Mega</option>
      </select>
    </div>
    <div>
      <label class="font-bold">Holiday vibe (Ctrl/Cmd for multiple)</label>
      <select id="vibes" multiple size="4" class="w-full mt-2 p-2 border rounded-lg shadow-sm">
        <option value="Family">Family</option>
        <option value="Adventure">Adventure</option>
        <option value="Relaxation">Relaxation</option>
        <option value="Party">Party</option>
      </select>
    </div>
    <div>
      <label class="font-bold">Amenities (Ctrl/Cmd)</label>
      <select id="amenities" multiple size="6" class="w-full mt-2 p-2 border rounded-lg shadow-sm">
        <option value="Pools">Pools</option>
        <option value="Spa">Spa</option>
        <option value="Shows">Shows</option>
        <option value="Bars">Bars</option>
        <option value="Adventure Park">Adventure Park</option>
        <option value="Kids Club">Kids Club</option>
      </select>
    </div>
  </div>

  <div class="mt-6 text-center">
    <button class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-lg font-bold shadow-lg transition" onclick="calculateScores()">
      Find My Perfect Ship
    </button>
  </div>
</section>

<!-- Results Section -->
<section id="results" class="w-full max-w-5xl grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
  <!-- Ship cards generated by JS will appear here -->
</section>

<script src="ship_matcher.js"></script>
</body>
</html>
